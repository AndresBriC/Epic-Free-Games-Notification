name: Epic Free Games Notifier

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # --- Download latest DB from previous runs ---
      - name: Download previous DB (latest run)
        uses: dawidd6/action-download-artifact@v3
        with:
          name: epic-db
          path: .
          if_no_artifact_found: warn

      # Optional: verify what we have
      - name: Check files
        run: ls -l

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python script.py

      # --- Always upload DB so next run can use it ---
      - name: Upload updated DB
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: epic-db
          path: games.db
          retention-days: 30